<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="מדריך טיול לאתונה עם ילדים - מסלול יום יום, אטרקציות, לינה וטיפים מניסיון אישי. מתי טסים.">
  <title>טיול לאתונה עם ילדים - מדריך מלא | מתי טסים</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=Secular+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    :root {
      --amber: #E8A045; --amber-light: #f0b868; --amber-dark: #c4872e;
      --teal: #1A6B72; --teal-dark: #124d52;
      --cream: #FDF8F2; --charcoal: #2C2C2C; --sand: #F5EDD8; --sand-dark: #e8ddc4;
      --green: #4A9B6F; --white: #FFFFFF;
      --athens: #1565C0; --athens-dark: #0D47A1;
      --font-heading: 'Secular One', sans-serif; --font-body: 'Rubik', sans-serif;
      --nav-height: 72px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); font-size: 17px; line-height: 1.8; color: var(--charcoal); background: var(--cream); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    h1,h2,h3,h4 { font-family: var(--font-heading); font-weight: 400; line-height: 1.3; }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font-body); cursor: pointer; border: none; background: none; }
    ul { list-style: none; }
    .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* NAV */
    .nav { position: fixed; top: 0; right: 0; left: 0; z-index: 1000; height: var(--nav-height); background: var(--cream); border-bottom: 1px solid var(--sand-dark); transition: box-shadow 0.3s ease; }
    .nav.scrolled { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .nav__inner { display: flex; align-items: center; justify-content: space-between; height: 100%; position: relative; }
    .nav__logo {
      font-family: var(--font-heading);
      font-size: 24px;
      color: var(--teal);
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .nav__links { display: flex; align-items: center; gap: 8px; position: absolute; left: 50%; transform: translateX(-50%); }
    .nav__link {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-weight: 500;
      font-size: 15px;
      color: var(--charcoal);
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .nav__link:hover,
    .nav__link:focus-visible {
      background: var(--sand);
      color: var(--teal);
    }
    .nav__link:focus-visible {
      outline: 2px solid var(--teal);
      outline-offset: 2px;
    }
    .nav__link[aria-current="page"],
    .nav__link.active {
      background: var(--teal);
      color: var(--white);
    }
    .nav__link[aria-current="page"]:hover,
    .nav__link.active:hover,
    .nav__link[aria-current="page"]:focus-visible {
      background: var(--teal-dark);
      color: var(--white);
    }
    .nav__mobile-actions { display: none; align-items: center; gap: 12px; }
    .nav__hamburger { display: flex; width: 44px; height: 44px; align-items: center; justify-content: center; flex-direction: column; gap: 5px; padding: 8px; }
    .nav__hamburger span { display: block; width: 24px; height: 2px; background: var(--charcoal); border-radius: 2px; transition: all 0.3s ease; }
    .nav__hamburger[aria-expanded="true"] span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .nav__hamburger[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
    .nav__hamburger[aria-expanded="true"] span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .nav__whatsapp-mobile { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: var(--green); }
    .nav__mobile-menu { display: none; position: fixed; top: var(--nav-height); right: 0; left: 0; bottom: 0; background: var(--cream); padding: 32px 24px; flex-direction: column; gap: 8px; z-index: 999; overflow-y: auto; }
    .nav__mobile-menu.open { display: flex; }
    .nav__mobile-menu .nav__link { font-size: 20px; padding: 16px; }

    /* HERO */
    .article-hero { background: linear-gradient(155deg, var(--athens-dark) 0%, var(--athens) 40%, #1976D2 100%); padding-top: calc(var(--nav-height) + 56px); padding-bottom: 70px; color: var(--white); position: relative; overflow: hidden; }
    .article-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 80% 50%, rgba(232,160,69,0.1) 0%, transparent 60%); }
    .article-hero::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 70px; background: linear-gradient(to top, var(--cream), transparent); }
    .article-hero__inner { position: relative; max-width: 780px; }
    .article-hero__breadcrumb { font-size: 13px; opacity: 0.7; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .article-hero__breadcrumb a { opacity: 0.8; }
    .article-hero__flag { font-size: 56px; margin-bottom: 16px; display: block; }
    .article-hero__title { font-size: clamp(28px, 4.5vw, 50px); margin-bottom: 18px; }
    .article-hero__subtitle { font-size: clamp(15px, 1.8vw, 18px); font-weight: 300; opacity: 0.88; margin-bottom: 32px; max-width: 600px; line-height: 1.7; }
    .article-hero__meta { display: flex; flex-wrap: wrap; gap: 12px; }
    .article-hero__badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; padding: 7px 16px; font-size: 14px; font-weight: 500; }

    /* BODY */
    .article-body { padding: 60px 0 80px; }
    .article-layout { display: grid; grid-template-columns: 1fr 300px; gap: 48px; align-items: start; }
    .article-content { min-width: 0; }
    .article-section { margin-bottom: 52px; }
    .article-section__title { font-size: clamp(20px, 2.5vw, 26px); color: var(--teal); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--sand-dark); display: flex; align-items: center; gap: 10px; }
    .article-content p { margin-bottom: 16px; color: #444; line-height: 1.85; }

    /* TIMELINE */
    .timeline { position: relative; padding: 8px 0 0; }
    .timeline::before { content: ''; position: absolute; top: 0; bottom: 0; right: 50%; width: 3px; background: linear-gradient(to bottom, var(--athens), var(--amber), var(--athens-dark)); transform: translateX(50%); border-radius: 3px; }
    .tl-item { display: grid; grid-template-columns: 1fr 56px 1fr; margin-bottom: 48px; position: relative; align-items: start; }
    .tl-item__label { font-family: var(--font-heading); font-size: 13px; color: #aaa; letter-spacing: 0.5px; padding-top: 18px; }
    .tl-item:nth-child(odd)  .tl-item__label { text-align: left; padding-right: 28px; }
    .tl-item:nth-child(even) .tl-item__label { text-align: right; padding-left: 28px; order: 3; }
    .tl-item__node { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; padding-top: 12px; }
    .tl-item__icon { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 4px solid var(--cream); box-shadow: 0 2px 12px rgba(0,0,0,0.15); flex-shrink: 0; }
    .tl-item__day-label { margin-top: 6px; font-family: var(--font-heading); font-size: 11px; color: #aaa; letter-spacing: 0.5px; }
    .tl-item__card { background: var(--white); border-radius: 18px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 2px solid var(--sand-dark); transition: transform 0.35s ease, box-shadow 0.35s ease; }
    .tl-item__card:hover { transform: translateY(-4px); box-shadow: 0 10px 32px rgba(0,0,0,0.13); }
    .tl-item:nth-child(odd)  .tl-item__card { margin-left: 24px; }
    .tl-item:nth-child(even) .tl-item__card { margin-right: 24px; order: -1; }
    .tl-card__band { height: 6px; width: 100%; }
    .tl-card__header { padding: 16px 20px 12px; }
    .tl-card__title { font-family: var(--font-heading); font-size: 16px; color: var(--charcoal); line-height: 1.35; }
    .tl-card__date { font-size: 12px; color: #aaa; margin-top: 4px; }
    .tl-card__toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 10px 20px 14px; background: none; border: none; cursor: pointer; font-family: var(--font-body); font-size: 13px; color: var(--teal); font-weight: 600; border-top: 1px solid var(--sand); }
    .tl-card__toggle:hover { background: var(--sand); }
    .tl-card__chevron { transition: transform 0.3s; }
    .tl-card.open .tl-card__chevron { transform: rotate(180deg); }
    .tl-card__body { display: none; padding: 0 20px 18px; }
    .tl-card.open .tl-card__body { display: block; }
    .tl-activity { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--sand-dark); }
    .tl-activity:last-of-type { border-bottom: none; }
    .tl-activity__time { font-size: 11px; font-weight: 700; color: var(--teal); min-width: 46px; padding-top: 2px; }
    .tl-activity__name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
    .tl-activity__desc { font-size: 13px; color: #666; line-height: 1.55; }
    .tl-tip { margin-top: 12px; background: rgba(232,160,69,0.1); border-right: 3px solid var(--amber); border-radius: 0 8px 8px 0; padding: 9px 13px; font-size: 13px; color: #666; }
    .tl-tip strong { color: var(--amber-dark); }
    .tl-hotel { margin-top: 10px; display: flex; align-items: center; justify-content: space-between; background: var(--sand); border-radius: 8px; padding: 9px 13px; font-size: 13px; }
    .tl-hotel__label { color: #888; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 2px; }
    .tl-hotel__name { font-weight: 700; color: var(--charcoal); font-size: 13px; }
    .tl-hotel__link { display: inline-flex; align-items: center; gap: 4px; background: var(--teal); color: white; border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; white-space: nowrap; opacity: 0.5; }

    /* DAY COLORS */
    .tl-item--arrive .tl-item__icon { background: linear-gradient(135deg, var(--athens), var(--athens-dark)); color: #fff; }
    .tl-item--allou   .tl-item__icon { background: linear-gradient(135deg, #e91e63, #c2185b); color: #fff; }
    .tl-item--xplore  .tl-item__icon { background: linear-gradient(135deg, #9c27b0, #6a1b9a); color: #fff; }
    .tl-item--aegina  .tl-item__icon { background: linear-gradient(135deg, #00897b, #00695c); color: #fff; }
    .tl-item--depart  .tl-item__icon { background: linear-gradient(135deg, var(--amber), var(--amber-dark)); color: #fff; }

    /* SIDEBAR */
    .sidebar { position: sticky; top: calc(var(--nav-height) + 24px); display: flex; flex-direction: column; gap: 24px; }
    .sidebar-card { background: var(--white); border-radius: 18px; padding: 24px; border: 2px solid var(--sand-dark); }
    .sidebar-card__title { font-family: var(--font-heading); font-size: 16px; color: var(--teal); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--sand); font-size: 14px; }
    .info-row:last-child { border-bottom: none; }
    .info-row__label { color: #888; }
    .info-row__val { font-weight: 600; color: var(--charcoal); }

    /* TIPS LIST */
    .tips-list { display: flex; flex-direction: column; gap: 10px; }
    .tip-item { display: flex; gap: 10px; align-items: flex-start; font-size: 14px; color: #555; }
    .tip-item__icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }

    /* PHOTO GALLERY */
    .photo-gallery { margin-bottom: 52px; }
    .photo-gallery__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .photo-gallery__item { border-radius: 12px; overflow: hidden; aspect-ratio: 4/3; position: relative; cursor: pointer; }
    .photo-gallery__item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; display: block; }
    .photo-gallery__item:hover img { transform: scale(1.05); }
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
    .lightbox__close { position: absolute; top: 20px; left: 24px; color: #fff; font-size: 32px; cursor: pointer; }
    .lightbox__prev, .lightbox__next { position: absolute; top: 50%; transform: translateY(-50%); color: #fff; font-size: 36px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 50%; width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; }
    .lightbox__prev:hover, .lightbox__next:hover { background: rgba(255,255,255,0.25); }
    .lightbox__prev { right: 20px; }
    .lightbox__next { left: 20px; }

    /* CTA */
    .inline-cta { background: linear-gradient(135deg, var(--teal-dark), var(--teal)); border-radius: 20px; padding: 32px; text-align: center; color: white; margin-bottom: 52px; }
    .inline-cta h3 { font-size: 20px; margin-bottom: 8px; }
    .inline-cta p { font-size: 14px; opacity: 0.85; margin-bottom: 20px; }
    .btn-amber { display: inline-flex; align-items: center; gap: 8px; background: var(--amber); color: var(--charcoal); border-radius: 40px; padding: 13px 28px; font-size: 15px; font-weight: 700; font-family: var(--font-body); text-decoration: none; }
    .btn-amber:hover { background: var(--amber-dark); }

    .cta-card { background: var(--teal); border-radius: 18px; padding: 24px; color: var(--white); text-align: center; }
    .cta-card__title { font-family: var(--font-heading); font-size: 18px; margin-bottom: 10px; }
    .cta-card__text { font-size: 14px; opacity: 0.85; margin-bottom: 20px; line-height: 1.6; }
    .cta-card__btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--amber); color: var(--charcoal); border-radius: 12px; padding: 13px 20px; font-size: 15px; font-weight: 700; transition: background 0.2s, transform 0.2s; width: 100%; }
    .cta-card__btn:hover { background: var(--amber-dark); transform: translateY(-2px); }
    .cta-card__wa { display: flex; align-items: center; justify-content: center; gap: 8px; background: #25D366; color: var(--white); border-radius: 12px; padding: 13px 20px; font-size: 15px; font-weight: 600; transition: background 0.2s; margin-top: 10px; }
    .cta-card__wa:hover { background: #1da851; }

    .toc { background: var(--sand); border-radius: 14px; padding: 20px; margin-bottom: 36px; }
    .toc__title { font-family: var(--font-heading); font-size: 15px; color: var(--teal); margin-bottom: 12px; }
    .toc__list { display: flex; flex-direction: column; gap: 6px; }
    .toc__link { font-size: 14px; color: var(--teal); display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .toc__link:hover { color: var(--amber-dark); }
    .toc__num { font-size: 11px; background: var(--teal); color: var(--white); border-radius: 4px; padding: 1px 6px; font-weight: 600; }

    /* FOOTER */
    .footer { background: var(--charcoal); color: rgba(255,255,255,0.6); padding: 32px 0; text-align: center; font-size: 14px; margin-top: 0; }
    .footer a { color: var(--amber); }

    @media (max-width: 900px) {
      .nav__links { display: none; }
      .nav__mobile-actions { display: flex; }
      .article-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .timeline::before { right: 27px; transform: none; }
      .tl-item { grid-template-columns: 56px 1fr; }
      .tl-item__label { display: none; }
      .tl-item:nth-child(odd)  .tl-item__card { margin-left: 0; margin-right: 0; }
      .tl-item:nth-child(even) .tl-item__card { margin-right: 0; order: unset; }
      .tl-item:nth-child(even) .tl-item__label { order: unset; }
      .tl-item__node { padding-top: 12px; }
      .photo-gallery__grid { grid-template-columns: repeat(2, 1fr); }
    }
      50%       { opacity: 1;   transform: scale(1.3); }
    }
      50%       { opacity: 1;   transform: scale(1.3); }
    }
  
    /* ── Community CTA button ── */
    .nav__link--community {
      background: var(--amber);
      color: #2C2C2C !important;
      font-weight: 600;
      font-size: 15px;
      border-radius: 22px;
      padding: 8px 18px;
      min-height: 44px;
      box-shadow: 0 2px 10px rgba(232,160,69,0.45);
      animation: communityPulse 2.8s ease-in-out infinite;
    }
    .nav__link--community:hover,
    .nav__link--community:focus-visible {
      background: #d4903c !important;
      color: #2C2C2C !important;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(232,160,69,0.55);
      animation: none;
    }
    .nav__link--community::before {
      content: '';
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-left: 7px;
      box-shadow: 0 0 6px #4ade80;
      animation: dotBlink 1.4s ease-in-out infinite;
    }
    .nav__mobile-menu .nav__link--community {
      font-size: 15px;
      padding: 8px 18px;
      width: fit-content;
      min-height: 44px;
    }
    @keyframes communityPulse {
      0%, 100% { box-shadow: 0 2px 10px rgba(232,160,69,0.4); }
      50%       { box-shadow: 0 2px 18px rgba(232,160,69,0.75), 0 0 0 4px rgba(232,160,69,0.15); }
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 0.4; box-shadow: 0 0 3px #4ade80; }
      50%       { opacity: 1;   box-shadow: 0 0 10px #4ade80, 0 0 20px #4ade8088; }
    }
  
    /* ── NAV ─────────────────────────────── */
    .nav { position:fixed; top:0; right:0; left:0; z-index:1000; background:var(--cream); border-bottom:1px solid var(--sand-dark); height:var(--nav-height); transition:box-shadow 0.3s ease; }
    .nav.scrolled { box-shadow:0 4px 16px rgba(0,0,0,0.1); }
    .nav__inner { max-width:1140px; margin:0 auto; padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:100%; position:relative; }
    .nav__logo { display:flex; align-items:center; gap:8px; text-decoration:none; flex-shrink:0; }
    .nav__logo-text { font-family:'Secular One',sans-serif; font-size:28px; color:var(--teal); font-weight:700; }

    .nav__link:hover, .nav__link:focus-visible { background:var(--sand); color:var(--teal); }
    .nav__link.active, .nav__link[aria-current="page"] { background:var(--teal); color:#fff; }
    .nav__link.active:hover { background:var(--teal-dark); color:#fff; }
    .nav__mobile-actions { display:none; align-items:center; gap:4px; }

    .nav__whatsapp-mobile { width:44px; height:44px; display:flex; align-items:center; justify-content:center; color:#25D366; }
    .nav__mobile-menu { display:none; position:fixed; top:var(--nav-height); right:0; left:0; bottom:0; background:var(--cream); padding:32px 24px; flex-direction:column; gap:8px; z-index:999; overflow-y:auto; }
    .nav__mobile-menu.open { display:flex; }
    .nav__mobile-menu .nav__link { font-size:20px; padding:16px; justify-content:flex-start; }
    .nav__link--community { background:var(--amber); color:#2C2C2C !important; font-weight:600; font-size:15px; border-radius:22px; padding:8px 16px; min-height:44px; box-shadow:0 2px 10px rgba(232,160,69,0.45); animation:communityPulse 2.8s ease-in-out infinite; }
    .nav__link--community:hover, .nav__link--community:focus-visible { background:#d4903c !important; color:#2C2C2C !important; transform:translateY(-2px); box-shadow:0 4px 16px rgba(232,160,69,0.55); animation:none; }
    .nav__link--community::before { content:''; width:8px; height:8px; background:#4ade80; border-radius:50%; display:inline-block; margin-left:7px; box-shadow:0 0 6px #4ade80; animation:dotBlink 1.4s ease-in-out infinite; }

<script>
  (function () {
    'use strict';

    var nav = document.getElementById('nav');
    var hamburger = document.getElementById('hamburgerBtn');
    var mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', function () {
      var isOpen = mobileMenu.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', isOpen.toString());
      hamburger.setAttribute('aria-label', isOpen ? 'סגור תפריט' : 'פתח תפריט');
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });

    var mobileLinks = mobileMenu.querySelectorAll('a');
    mobileLinks.forEach(function (link) {
      link.addEventListener('click', function () {
        mobileMenu.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        hamburger.setAttribute('aria-label', 'פתח תפריט');
        document.body.style.overflow = '';
      });
    });

    window.addEventListener('scroll', function () {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && mobileMenu.classList.contains('open')) {
        mobileMenu.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        hamburger.setAttribute('aria-label', 'פתח תפריט');
        document.body.style.overflow = '';
        hamburger.focus();
      }
    });

  })();
</script>
